name: Build Habaeb App Pro

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # محرك الذكاء والتحقق الذاتي من ملف gradlew
      - name: Auto-Generate Wrapper & Build
        run: |
          if [ -f "./gradlew" ]; then
            echo "✅ Gradle wrapper found. Granting permissions and building..."
            chmod +x gradlew
            ./gradlew assembleDebug --stacktrace
          else
            echo "⚠️ Gradle wrapper NOT found! Auto-generating wrapper..."
            gradle wrapper
            chmod +x gradlew
            ./gradlew assembleDebug --stacktrace
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Habaeb-Accounts-Final-Build
          path: app/build/outputs/apk/debug/*.apk
